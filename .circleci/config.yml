# TraceMint Security Scanner
# Auto-generated CircleCI configuration
# Generated: 2026-06-26 22:25

version: 2.1

jobs:
  tracemint-security:
    docker:
      - image: cimg/base:stable
    resource_class: medium
    environment:
      TRACEMINT_CI_PROVIDER: circleci
    steps:
      - checkout
      - run:
          name: TraceMint security scan
          no_output_timeout: 20m
          command: |
            set -euo pipefail
            if ! command -v jq >/dev/null || ! command -v curl >/dev/null; then
              sudo apt-get update
              sudo apt-get install -y jq curl
            fi
            command -v curl >/dev/null || { echo "ERROR: curl is required"; exit 2; }
            command -v jq >/dev/null || { echo "ERROR: jq is required"; exit 2; }

            TRACEMINT_URL_VALUE=https://based-equipment-historical-oral.trycloudflare.com
            if printf '%s' "$TRACEMINT_URL_VALUE" | grep -q '[[:cntrl:][:space:]]'; then
              echo "ERROR: TRACEMINT_URL must not contain control characters or whitespace"; exit 2
            fi
            case "$TRACEMINT_URL_VALUE" in
              http://*@*|https://*@*) echo "ERROR: TRACEMINT_URL must not contain embedded credentials"; exit 2 ;;
              http://*|https://*) ;;
              *) echo "ERROR: TRACEMINT_URL must start with http:// or https://"; exit 2 ;;
            esac
            TRACEMINT_URL_VALUE="${TRACEMINT_URL_VALUE%/}"

            PAYLOAD=$(jq -n \
              --arg pid "7479fc02-304c-4a6d-aa90-384464b4c405" \
              --arg mode "fast" \
              --arg sha "${CIRCLE_SHA1:-unknown}" \
              --arg base "${CIRCLE_BRANCH:-main}" \
              --arg head "${CIRCLE_BRANCH:-main}" \
              --arg repo "${CIRCLE_PROJECT_USERNAME:-circleci}/${CIRCLE_PROJECT_REPONAME:-repository}" \
              --argjson pr "0" \
              '{
                "project_id": $pid,
                "scan_mode": $mode,
                "commit_sha": $sha,
                "base_ref": $base,
                "head_ref": $head,
                "pr_number": $pr,
                "repo_full_name": $repo,
                "changed_files": []
              }')

            SCAN_RESPONSE=$(curl -sSf -X POST "$TRACEMINT_URL_VALUE/api/v1/cicd/pr-scan" \
              -H "X-API-Key: $TRACEMINT_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD") || { echo "ERROR: TraceMint API unreachable / scan not started"; exit 1; }

            SCAN_ID=$(echo "$SCAN_RESPONSE" | jq -r '.scan_id')
            if [ -z "$SCAN_ID" ] || [ "$SCAN_ID" = "null" ]; then
              echo "ERROR: TraceMint API did not return scan_id"; exit 1
            fi
            echo "TraceMint scan started: $SCAN_ID"

            DEADLINE=$((SECONDS + 15 * 60))
            STATUS="running"
            while [ "$STATUS" = "running" ] || [ "$STATUS" = "initializing" ] || [ "$STATUS" = "scanning" ]; do
              if [ "$SECONDS" -ge "$DEADLINE" ]; then
                echo "ERROR: TraceMint scan timed out"; exit 1
              fi
              sleep 10
              SUMMARY=$(curl -sSf "$TRACEMINT_URL_VALUE/api/v1/cicd/status/$SCAN_ID" \
                -H "X-API-Key: $TRACEMINT_API_KEY") || { echo "ERROR: could not fetch scan summary"; exit 1; }
              STATUS=$(echo "$SUMMARY" | jq -r '.status')
              echo "Scan status: $STATUS"
            done

            if [ "$STATUS" != "completed" ]; then
              echo "ERROR: TraceMint scan did not complete (status=$STATUS)"; exit 1
            fi

            echo "$SUMMARY" | jq -e '.severity.critical != null and .severity.high != null and .severity.medium != null' >/dev/null 2>&1 \
              || { echo "ERROR: scan summary missing severity counts"; exit 1; }
            echo "$SUMMARY" > tracemint-summary.json

            curl -sSf "$TRACEMINT_URL_VALUE/api/v1/cicd/$SCAN_ID/sarif?new_only=false" \
              -H "X-API-Key: $TRACEMINT_API_KEY" \
              -o tracemint-results.sarif || { echo "ERROR: SARIF export failed"; exit 1; }
            if [ ! -s tracemint-results.sarif ]; then
              echo "ERROR: empty SARIF — refusing to publish"; exit 1
            fi
            jq -e '.version == "2.1.0" and (.runs[0].results | type == "array")' tracemint-results.sarif >/dev/null \
              || { echo "ERROR: invalid SARIF — refusing to publish"; exit 1; }

            curl -sSf "$TRACEMINT_URL_VALUE/api/v1/cicd/$SCAN_ID/findings?limit=100" \
              -H "X-API-Key: $TRACEMINT_API_KEY" \
              -o tracemint-findings.json || { echo "ERROR: findings export failed"; exit 1; }

            SARIF_SHA256=$(sha256sum tracemint-results.sarif | awk '{print $1}')
            SUMMARY_SHA256=$(sha256sum tracemint-summary.json | awk '{print $1}')
            FINDINGS_SHA256=$(sha256sum tracemint-findings.json | awk '{print $1}')
            FINDINGS_COUNT=$(jq -r '(.findings // .items // []) | length' tracemint-findings.json)
            jq -n \
              --arg schema_version "tracemint.ci-evidence.v1" \
              --arg provider "$TRACEMINT_CI_PROVIDER" \
              --arg scan_id "$SCAN_ID" \
              --arg commit_sha "${CIRCLE_SHA1:-unknown}" \
              --arg branch "${CIRCLE_BRANCH:-main}" \
              --arg repo "${CIRCLE_PROJECT_USERNAME:-circleci}/${CIRCLE_PROJECT_REPONAME:-repository}" \
              --arg sarif_sha256 "$SARIF_SHA256" \
              --arg summary_sha256 "$SUMMARY_SHA256" \
              --arg findings_sha256 "$FINDINGS_SHA256" \
              --argjson findings_count "$FINDINGS_COUNT" \
              '{schema_version:$schema_version,provider:$provider,traceability:{scan_id:$scan_id,repository:$repo,commit_sha:$commit_sha,branch:$branch},artifacts:{sarif:{filename:"tracemint-results.sarif",sha256:$sarif_sha256,new_only:false},summary:{filename:"tracemint-summary.json",sha256:$summary_sha256},findings:{filename:"tracemint-findings.json",sha256:$findings_sha256,count:$findings_count}},quality_gate:{source:"tracemint-summary.json"}}' \
              > tracemint-evidence-manifest.json

      - store_artifacts:
          path: tracemint-results.sarif
          destination: tracemint-results.sarif
      - store_artifacts:
          path: tracemint-summary.json
          destination: tracemint-summary.json
      - store_artifacts:
          path: tracemint-findings.json
          destination: tracemint-findings.json
      - store_artifacts:
          path: tracemint-evidence-manifest.json
          destination: tracemint-evidence-manifest.json

workflows:
  tracemint-security:
    jobs:
      - tracemint-security:
          filters:
            branches:
              only:
                - tracemint-circleci-smoke-20260626
